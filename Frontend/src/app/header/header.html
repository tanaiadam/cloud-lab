<header class="app-header">
  <div class="logo-container">
    <img ngSrc="camera.svg" alt="Photo Album Logo" width="92" height="53" priority />
    <h1>Photo Album</h1>
  </div>

  <nav class="user-actions" aria-label="User navigation">
    @if (isLoggedIn()) {
      <span>Welcome, {{ user()?.name }}</span>
      <button
        type="button"
        class="btn-primary"
        (click)="logout()"
        aria-label="Log out of your account">
        Logout
      </button>
    }
  </nav>
</header>
